yes<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NumKnight Logo Preview</title>
  <style>
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: sans-serif;
      gap: 40px;
    }
    .label {
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      letter-spacing: 0.1em;
      margin-bottom: -30px;
    }
    /* Simulate the game's start screen dark background */
    .game-bg {
      background: linear-gradient(180deg, #0f172a 0%, #1e1b4b 60%, #312e81 100%);
      border-radius: 16px;
      padding: 40px 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

  <p class="label">VARIANT A — Shield emblem + stacked text</p>
  <div class="game-bg">
    <svg width="340" height="180" viewBox="0 0 340 180" fill="none" xmlns="http://www.w3.org/2000/svg">

      <!-- ── HELMET ICON (left) ── -->
      <g transform="translate(20, 20)">
        <!-- Helmet dome -->
        <path d="M20 52 Q20 14 55 14 Q90 14 90 52 L86 55 Q76 48 66 53 L55 56 L44 53 Q34 48 24 55Z"
          fill="#90a4ae" stroke="#424242" strokeWidth="3"/>
        <!-- Cheek guards -->
        <rect x="14" y="46" width="16" height="24" rx="8" fill="#90a4ae" stroke="#424242" strokeWidth="2.5"/>
        <rect x="80" y="46" width="16" height="24" rx="8" fill="#90a4ae" stroke="#424242" strokeWidth="2.5"/>
        <!-- Face area -->
        <rect x="28" y="53" width="54" height="26" rx="6" fill="#ffb74d" stroke="#424242" strokeWidth="2.5"/>
        <!-- Visor slit -->
        <rect x="28" y="60" width="54" height="8" rx="4" fill="#37474f" stroke="#424242" strokeWidth="2"/>
        <!-- Gold visor highlight -->
        <rect x="32" y="62" width="46" height="3" rx="1.5" fill="#ffd54f" opacity="0.7"/>
        <!-- Helmet band -->
        <path d="M20 52 Q55 44 90 52" stroke="#607d8b" strokeWidth="7" fill="none" strokeLinecap="butt"/>
        <path d="M20 52 Q55 44 90 52" stroke="#cfd8dc" strokeWidth="1.5" fill="none" strokeLinecap="round" opacity="0.6"/>
        <!-- Gold cross on forehead -->
        <line x1="55" y1="22" x2="55" y2="44" stroke="#ffd54f" strokeWidth="3.5" strokeLinecap="round"/>
        <line x1="44" y1="33" x2="66" y2="33" stroke="#ffd54f" strokeWidth="3.5" strokeLinecap="round"/>
        <!-- Plume -->
        <path d="M55 14 Q48 2 42 8 Q52 10 55 14Z" fill="#ef4444" stroke="#c62828" strokeWidth="1.5"/>
        <path d="M55 14 Q62 2 68 8 Q58 10 55 14Z" fill="#ef4444" stroke="#c62828" strokeWidth="1.5"/>
      </g>

      <!-- ── TEXT ── -->
      <g transform="translate(136, 28)">
        <!-- "NUM" -->
        <text
          x="0" y="58"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="64"
          font-weight="900"
          fill="white"
          stroke="#2d2d2d"
          stroke-width="6"
          paint-order="stroke fill"
          letter-spacing="-2"
        >NUM</text>

        <!-- "KNIGHT" — slightly smaller, gold -->
        <text
          x="2" y="110"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="46"
          font-weight="900"
          fill="#ffd54f"
          stroke="#4e342e"
          stroke-width="5"
          paint-order="stroke fill"
          letter-spacing="4"
        >KNIGHT</text>

        <!-- Decorative line between words -->
        <line x1="0" y1="70" x2="195" y2="70" stroke="#ffd54f" stroke-width="2" opacity="0.4"/>
      </g>

      <!-- Gold glow behind text (subtle) -->
      <!-- Star/sparkle on the "U" of NUM -->
      <g transform="translate(183, 22)">
        <circle cx="0" cy="0" r="6" fill="#ffd54f" opacity="0.9"/>
        <line x1="0" y1="-10" x2="0" y2="10" stroke="#ffd54f" strokeWidth="2.5" opacity="0.8"/>
        <line x1="-10" y1="0" x2="10" y2="0" stroke="#ffd54f" strokeWidth="2.5" opacity="0.8"/>
        <line x1="-7" y1="-7" x2="7" y2="7" stroke="#ffd54f" strokeWidth="1.5" opacity="0.5"/>
        <line x1="7" y1="-7" x2="-7" y2="7" stroke="#ffd54f" strokeWidth="1.5" opacity="0.5"/>
      </g>
    </svg>
  </div>

  <p class="label">VARIANT B — Horizontal, helmet left, single-line text</p>
  <div class="game-bg">
    <svg width="380" height="110" viewBox="0 0 380 110" fill="none" xmlns="http://www.w3.org/2000/svg">

      <!-- Helmet (smaller) -->
      <g transform="translate(8, 5) scale(0.75)">
        <path d="M20 52 Q20 14 55 14 Q90 14 90 52 L86 55 Q76 48 66 53 L55 56 L44 53 Q34 48 24 55Z"
          fill="#90a4ae" stroke="#424242" strokeWidth="3"/>
        <rect x="14" y="46" width="16" height="24" rx="8" fill="#90a4ae" stroke="#424242" strokeWidth="2.5"/>
        <rect x="80" y="46" width="16" height="24" rx="8" fill="#90a4ae" stroke="#424242" strokeWidth="2.5"/>
        <rect x="28" y="53" width="54" height="26" rx="6" fill="#ffb74d" stroke="#424242" strokeWidth="2.5"/>
        <rect x="28" y="60" width="54" height="8" rx="4" fill="#37474f" stroke="#424242" strokeWidth="2"/>
        <rect x="32" y="62" width="46" height="3" rx="1.5" fill="#ffd54f" opacity="0.7"/>
        <path d="M20 52 Q55 44 90 52" stroke="#607d8b" strokeWidth="7" fill="none" strokeLinecap="butt"/>
        <path d="M20 52 Q55 44 90 52" stroke="#cfd8dc" strokeWidth="1.5" fill="none" strokeLinecap="round" opacity="0.6"/>
        <line x1="55" y1="22" x2="55" y2="44" stroke="#ffd54f" strokeWidth="3.5" strokeLinecap="round"/>
        <line x1="44" y1="33" x2="66" y2="33" stroke="#ffd54f" strokeWidth="3.5" strokeLinecap="round"/>
        <path d="M55 14 Q48 2 42 8 Q52 10 55 14Z" fill="#ef4444" stroke="#c62828" strokeWidth="1.5"/>
        <path d="M55 14 Q62 2 68 8 Q58 10 55 14Z" fill="#ef4444" stroke="#c62828" strokeWidth="1.5"/>
      </g>

      <!-- Single line "NumKnight" -->
      <text
        x="86" y="76"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="62"
        font-weight="900"
        fill="white"
        stroke="#2d2d2d"
        stroke-width="6"
        paint-order="stroke fill"
      ><tspan fill="white">Num</tspan><tspan fill="#ffd54f">Knight</tspan></text>

      <!-- Sword underline decoration -->
      <g transform="translate(86, 86)">
        <!-- blade -->
        <line x1="0" y1="0" x2="268" y2="0" stroke="#90a4ae" stroke-width="3" stroke-linecap="round"/>
        <!-- crossguard -->
        <line x1="20" y1="-7" x2="20" y2="7" stroke="#ffd54f" stroke-width="4" stroke-linecap="round"/>
        <!-- tip -->
        <path d="M265 -3 L275 0 L265 3Z" fill="#90a4ae"/>
      </g>
    </svg>
  </div>

  <p class="label">VARIANT C — Shield badge / emblem shape</p>
  <div class="game-bg">
    <svg width="220" height="240" viewBox="0 0 220 240" fill="none" xmlns="http://www.w3.org/2000/svg">

      <!-- Shield outline -->
      <path d="M10 20 L210 20 L210 130 Q110 220 10 130Z"
        fill="#1565c0" stroke="#0d47a1" strokeWidth="4"/>
      <!-- Shield inner border -->
      <path d="M22 30 L198 30 L198 126 Q110 205 22 126Z"
        fill="none" stroke="#ffd54f" strokeWidth="3" opacity="0.6"/>
      <!-- Shield shine -->
      <path d="M22 30 L198 30 L198 70 Q110 75 22 70Z"
        fill="white" opacity="0.07"/>

      <!-- Helmet centered in shield -->
      <g transform="translate(110, 80) scale(0.85) translate(-55, -50)">
        <path d="M20 52 Q20 14 55 14 Q90 14 90 52 L86 55 Q76 48 66 53 L55 56 L44 53 Q34 48 24 55Z"
          fill="#90a4ae" stroke="#2d2d2d" strokeWidth="2.5"/>
        <rect x="14" y="46" width="16" height="24" rx="8" fill="#90a4ae" stroke="#2d2d2d" strokeWidth="2"/>
        <rect x="80" y="46" width="16" height="24" rx="8" fill="#90a4ae" stroke="#2d2d2d" strokeWidth="2"/>
        <rect x="28" y="53" width="54" height="26" rx="6" fill="#ffb74d" stroke="#2d2d2d" strokeWidth="2"/>
        <rect x="28" y="60" width="54" height="8" rx="4" fill="#37474f" stroke="#2d2d2d" strokeWidth="1.5"/>
        <rect x="32" y="62" width="46" height="3" rx="1.5" fill="#ffd54f" opacity="0.7"/>
        <path d="M20 52 Q55 44 90 52" stroke="#607d8b" strokeWidth="6" fill="none"/>
        <path d="M20 52 Q55 44 90 52" stroke="#cfd8dc" strokeWidth="1.5" fill="none" opacity="0.6"/>
        <line x1="55" y1="22" x2="55" y2="44" stroke="#ffd54f" strokeWidth="3" strokeLinecap="round"/>
        <line x1="44" y1="33" x2="66" y2="33" stroke="#ffd54f" strokeWidth="3" strokeLinecap="round"/>
        <path d="M55 14 Q48 2 42 8 Q52 10 55 14Z" fill="#ef4444" stroke="#c62828" strokeWidth="1.5"/>
        <path d="M55 14 Q62 2 68 8 Q58 10 55 14Z" fill="#ef4444" stroke="#c62828" strokeWidth="1.5"/>
      </g>

      <!-- "NUM" text in shield -->
      <text x="110" y="148"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="32" font-weight="900" fill="white"
        stroke="#0d3a7a" stroke-width="4"
        paint-order="stroke fill"
        text-anchor="middle" letter-spacing="4"
      >NUM</text>
      <!-- "KNIGHT" text in shield -->
      <text x="110" y="180"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="22" font-weight="900" fill="#ffd54f"
        stroke="#0d3a7a" stroke-width="3"
        paint-order="stroke fill"
        text-anchor="middle" letter-spacing="5"
      >KNIGHT</text>
    </svg>
  </div>

</body>
</html>
