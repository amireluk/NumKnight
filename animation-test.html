<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NumKnight — Animation Lab</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0c1a;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 16px;
    }

    header {
      background: #1a1430;
      border: 1px solid #fbbf24;
      border-radius: 8px;
      padding: 10px 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1rem; color: #fbbf24; }
    header p  { font-size: .78rem; color: #64748b; }

    /* ── Main layout ── */
    .main {
      display: grid;
      grid-template-columns: 1fr 1fr 280px;
      gap: 14px;
      align-items: start;
    }
    @media (max-width: 900px) {
      .main { grid-template-columns: 1fr 1fr; }
      .controls { grid-column: 1 / -1; }
    }

    /* ── Stage ── */
    .stage-wrap { display: flex; flex-direction: column; gap: 8px; }
    .stage-label {
      font-size: .75rem;
      font-weight: 700;
      color: #fbbf24;
      text-transform: uppercase;
      letter-spacing: .08em;
      text-align: center;
    }
    .stage {
      background: #0a0818;
      border: 2px solid #2d2848;
      border-radius: 10px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      height: 260px;
    }
    .stage-bg {
      position: absolute; inset: 0;
      object-fit: cover;
      object-position: center;
      width: 100%; height: 100%;
      opacity: .5;
      pointer-events: none;
    }
    .sprite {
      position: relative;
      z-index: 2;
      margin-bottom: 24px;
      image-rendering: pixelated;
      background-repeat: no-repeat;
      transform-origin: center bottom;
    }

    /* ── Frame strip ── */
    .strip {
      display: flex;
      gap: 3px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .thumb {
      image-rendering: pixelated;
      background-repeat: no-repeat;
      border: 1px solid #2d2848;
      border-radius: 3px;
      cursor: pointer;
      transition: border-color .1s;
      flex-shrink: 0;
    }
    .thumb:hover  { border-color: #94a3b8; }
    .thumb.active { border-color: #fbbf24; box-shadow: 0 0 0 1px #fbbf24; }

    /* ── Controls panel ── */
    .controls {
      background: #1a1430;
      border: 1px solid #2d2848;
      border-radius: 10px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .ctrl-section h3 {
      font-size: .7rem;
      color: #fbbf24;
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 7px;
    }
    .pill-row { display: flex; gap: 5px; flex-wrap: wrap; }
    .pill {
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid #3d3660;
      background: #12102a;
      color: #94a3b8;
      cursor: pointer;
      font-size: .75rem;
      transition: all .12s;
    }
    .pill.active { background: #2d2848; color: #fbbf24; border-color: #fbbf24; }

    .slider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
    .slider-row label { font-size: .75rem; color: #94a3b8; min-width: 70px; }
    .slider-row input[type=range] { flex: 1; accent-color: #fbbf24; }
    .slider-row .val { font-size: .74rem; color: #e2e8f0; min-width: 34px; text-align: right; font-variant-numeric: tabular-nums; }

    .range-row { display: flex; align-items: center; gap: 6px; margin-bottom: 7px; }
    .range-row label { font-size: .75rem; color: #94a3b8; min-width: 70px; }
    .range-row input[type=number] {
      width: 44px; padding: 3px 5px;
      background: #0f0c1a; border: 1px solid #3d3660; border-radius: 4px;
      color: #e2e8f0; font-size: .75rem; text-align: center;
    }
    .range-row span { font-size: .7rem; color: #475569; }

    .play-btn {
      width: 100%;
      padding: 7px 0;
      border-radius: 7px;
      border: 2px solid #fbbf24;
      background: #3b2a00;
      color: #fde68a;
      font-weight: 700;
      font-size: .85rem;
      cursor: pointer;
      letter-spacing: .05em;
    }
    .play-btn:hover { background: #5a4000; }

    .code-hint {
      background: #0a0818;
      border: 1px solid #1e293b;
      border-radius: 6px;
      padding: 9px 11px;
      font-size: .68rem;
      color: #64748b;
      line-height: 1.8;
      font-family: monospace;
    }
    .code-hint .k { color: #7dd3fc; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>⚔️ NumKnight — Animation Lab</h1>
    <p>Spritesheet tester · CSS steps() · no build step · F5 to refresh</p>
  </div>
</header>

<div class="main">

  <!-- Stage A: ss_n2 -->
  <div class="stage-wrap" id="wrap-a">
    <div class="stage-label">ss_n2</div>
    <div class="stage">
      <img class="stage-bg" id="bg-a" src="assets/backgrounds/forest.webp" alt="" />
      <div class="sprite" id="sprite-a"></div>
    </div>
    <div class="strip" id="strip-a"></div>
  </div>

  <!-- Stage B: ss_npro -->
  <div class="stage-wrap" id="wrap-b">
    <div class="stage-label">ss_npro</div>
    <div class="stage">
      <img class="stage-bg" id="bg-b" src="assets/backgrounds/forest.webp" alt="" />
      <div class="sprite" id="sprite-b"></div>
    </div>
    <div class="strip" id="strip-b"></div>
  </div>

  <!-- Shared controls -->
  <div class="controls">

    <div class="ctrl-section">
      <h3>Row</h3>
      <div class="pill-row" id="row-btns">
        <button class="pill active" onclick="setRow(0)">Row 0</button>
        <button class="pill"        onclick="setRow(1)">Row 1</button>
        <button class="pill"        onclick="setRow(2)">Row 2</button>
      </div>
    </div>

    <div class="ctrl-section">
      <h3>Frame range</h3>
      <div class="range-row">
        <label>Start</label>
        <input type="number" id="inp-start" value="0" min="0" max="7" oninput="update()" />
        <span>0 – 7</span>
      </div>
      <div class="range-row">
        <label>End</label>
        <input type="number" id="inp-end" value="7" min="0" max="7" oninput="update()" />
      </div>
    </div>

    <div class="ctrl-section">
      <h3>Timing &amp; size</h3>
      <div class="slider-row">
        <label>FPS</label>
        <input type="range" id="inp-fps" min="1" max="24" step="1" value="8" oninput="update()" />
        <span class="val" id="val-fps">8</span>
      </div>
      <div class="slider-row">
        <label>Scale</label>
        <input type="range" id="inp-scale" min="0.5" max="4" step="0.25" value="1.5" oninput="update()" />
        <span class="val" id="val-scale">1.5×</span>
      </div>
      <div class="slider-row">
        <label>Flip</label>
        <input type="range" id="inp-flip" min="-1" max="1" step="2" value="1" oninput="update()" />
        <span class="val" id="val-flip">→</span>
      </div>
    </div>

    <div class="ctrl-section">
      <h3>Background</h3>
      <div class="pill-row" id="bg-btns">
        <button class="pill active" onclick="setBg('forest')">Forest</button>
        <button class="pill" onclick="setBg('swamp')">Swamp</button>
        <button class="pill" onclick="setBg('mountains')">Mountains</button>
        <button class="pill" onclick="setBg('castle')">Castle</button>
        <button class="pill" onclick="setBg('dragon-lair')">Dragon</button>
        <button class="pill" onclick="setBg(null)">None</button>
      </div>
    </div>

    <button class="play-btn" id="pause-btn" onclick="togglePause()">⏸ Pause</button>

    <div class="code-hint" id="code-hint"></div>
  </div>

</div>

<script>
const SHEETS = {
  a: { file: 'assets/characters/ss_n2.webp',   cols: 8, rows: 3, fw: 106, fh: 104, sw: 848, sh: 312 },
  b: { file: 'assets/characters/ss_npro.webp',  cols: 8, rows: 3, fw: 88,  fh: 128, sw: 704, sh: 384 },
}
const THUMB_SCALE = 0.55
let row     = 0
let paused  = false

function getInputs() {
  const fps   = parseInt(document.getElementById('inp-fps').value)
  const scale = parseFloat(document.getElementById('inp-scale').value)
  const flip  = parseFloat(document.getElementById('inp-flip').value)
  const start = Math.max(0, Math.min(7, parseInt(document.getElementById('inp-start').value) || 0))
  const end   = Math.max(start, Math.min(7, parseInt(document.getElementById('inp-end').value) || 7))
  return { fps, scale, flip, start, end }
}

function applySprite(id, sheet, { fps, scale, flip, start, end }) {
  const el     = document.getElementById('sprite-' + id)
  const steps  = end - start + 1
  const dur    = (steps / fps).toFixed(3)
  const startX = -(start * sheet.fw)
  const endX   = startX - steps * sheet.fw

  el.style.width           = sheet.fw + 'px'
  el.style.height          = sheet.fh + 'px'
  el.style.backgroundImage = `url('${sheet.file}')`
  el.style.backgroundSize  = `${sheet.sw}px ${sheet.sh}px`
  el.style.backgroundPositionY = -(row * sheet.fh) + 'px'
  el.style.transform       = `scaleX(${flip}) scale(${scale})`

  // Inject a per-sprite keyframe so each can have its own pixel offsets
  const kfName = `ss-walk-${id}`
  let styleEl = document.getElementById('kf-' + id)
  if (!styleEl) {
    styleEl = document.createElement('style')
    styleEl.id = 'kf-' + id
    document.head.appendChild(styleEl)
  }
  styleEl.textContent = `@keyframes ${kfName} { from { background-position-x: ${startX}px } to { background-position-x: ${endX}px } }`

  el.style.animation = 'none'
  void el.offsetWidth
  el.style.animation = `${kfName} ${dur}s steps(${steps}, end) infinite`
  if (paused) el.style.animationPlayState = 'paused'
}

function buildStrip(id, sheet, { start, end }) {
  const strip = document.getElementById('strip-' + id)
  strip.innerHTML = ''
  const tw = Math.round(sheet.fw * THUMB_SCALE)
  const th = Math.round(sheet.fh * THUMB_SCALE)
  const tsw = Math.round(sheet.sw * THUMB_SCALE)
  const tsh = Math.round(sheet.sh * THUMB_SCALE)
  for (let f = 0; f < sheet.cols; f++) {
    const d = document.createElement('div')
    d.className = 'thumb' + (f >= start && f <= end ? ' active' : '')
    d.title = 'Frame ' + f
    d.style.cssText = `width:${tw}px;height:${th}px;background-image:url('${sheet.file}');background-size:${tsw}px ${tsh}px;background-position:${-(f*sheet.fw*THUMB_SCALE)}px ${-(row*sheet.fh*THUMB_SCALE)}px`
    d.onclick = () => {
      document.getElementById('inp-start').value = f
      document.getElementById('inp-end').value   = f
      update()
    }
    strip.appendChild(d)
  }
}

function updateCodeHint({ fps, start, end }) {
  const sa = SHEETS.a, steps = end - start + 1, dur = (steps / fps).toFixed(3)
  document.getElementById('code-hint').innerHTML =
    `<span class="k">// ss_n2</span><br>` +
    `width:${sa.fw}px; height:${sa.fh}px;<br>` +
    `background-size:${sa.sw}px ${sa.sh}px;<br>` +
    `animation: walk ${dur}s steps(${steps}) infinite;<br><br>` +
    `<span class="k">// Framer Motion equivalent</span><br>` +
    `animate={{ x: [0, ${Math.round(sa.fw*1.5)}, 0] }}<br>` +
    `transition={{ duration: ${dur}, times:[0,.4,1] }}`
}

function update() {
  const inp = getInputs()
  document.getElementById('val-fps').textContent   = inp.fps
  document.getElementById('val-scale').textContent = inp.scale + '×'
  document.getElementById('val-flip').textContent  = inp.flip === -1 ? '←' : '→'
  applySprite('a', SHEETS.a, inp)
  applySprite('b', SHEETS.b, inp)
  buildStrip('a', SHEETS.a, inp)
  buildStrip('b', SHEETS.b, inp)
  updateCodeHint(inp)
}

function setRow(r) {
  row = r
  document.querySelectorAll('#row-btns .pill').forEach((b, i) => b.classList.toggle('active', i === r))
  update()
}

function setBg(world) {
  const src = world ? `assets/backgrounds/${world}.webp` : ''
  document.getElementById('bg-a').src = src
  document.getElementById('bg-b').src = src
  document.getElementById('bg-a').style.opacity = world ? '0.5' : '0'
  document.getElementById('bg-b').style.opacity = world ? '0.5' : '0'
  document.querySelectorAll('#bg-btns .pill').forEach(b => {
    const match = world ? b.getAttribute('onclick') === `setBg('${world}')` : b.getAttribute('onclick') === 'setBg(null)'
    b.classList.toggle('active', match)
  })
}

function togglePause() {
  paused = !paused
  const state = paused ? 'paused' : 'running'
  document.getElementById('sprite-a').style.animationPlayState = state
  document.getElementById('sprite-b').style.animationPlayState = state
  document.getElementById('pause-btn').textContent = paused ? '▶ Play' : '⏸ Pause'
}

// Init
update()
</script>
</body>
</html>
